version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: anycdc_reader
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    command: >
      postgres 
      -c wal_level=logical 
      -c max_wal_senders=10 
      -c max_replication_slots=10
    restart: unless-stopped

  mysql:
    image: mysql:latest
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: anycdc_reader
      MYSQL_DATABASE: mysql
    ports:
      - "13306:3306"
    command: >
      --server-id=1 
      --log-bin=mysql-bin 
      --binlog-format=ROW 
      --binlog-row-image=FULL
    restart: unless-stopped

volumes:
  postgres-data:
  mysql-data: